slurm:
  job_name: jaxgcrl_reacher
  output: logs/%x_%j.log
  error: logs/%x_%j.err
  nodes: 1
  ntasks: 1
  cpus_per_task: 10
  mem: 50G
  time: "48:00:00"
  partition: compsci-gpu
  # NOTE: RTX PRO 6000 Blackwell nodes (fitz-45-49) require JAX >= 0.4.35.
  # Current JAX 0.4.23 only supports up to Hopper (sm_90). Use A5000 for now.
  gres: gpu:a5000:1

env:
  XLA_PYTHON_CLIENT_MEM_FRACTION: "0.9"

args:
  wandb_mode: online
  env_id: reacher
  eval_env_id: reacher
  num_epochs: 100
  total_env_steps: 100000000
  critic_depth: 16
  actor_depth: 16
  actor_skip_connections: 4
  critic_skip_connections: 4
  critic_network_width: 256
  actor_network_width: 256
  batch_size: 512
  actor_embed_reg: true
  vis_length: 1000
  save_buffer: 0
  unified_encoder: true
  # Optional: sigreg: true
